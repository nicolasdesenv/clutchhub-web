<!DOCTYPE html>
<html>
<head>
    <title>Redirecionando...</title>
    <style>
        body { background: #040508; color: #00E5FF; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    </style>
</head>
<body>
    <h2 id="statusMessage">Analisando dados do login...</h2>
    <script>
        const fullUrl = window.location.href;
        
        const decodedUrl = decodeURIComponent(fullUrl);
        
        if (decodedUrl.includes("openid/id/")) {
            const match = decodedUrl.match(/openid\/id\/(\d+)/);
            if (match && match[1]) {
                const steamId = match[1];
                document.getElementById('statusMessage').innerText = "Autenticado! Voltando ao aplicativo...";
                
                window.location.href = `clutchhub://login/${steamId}`;
                
                setTimeout(() => window.close(), 3000);
            } else {
                 document.getElementById('statusMessage').innerHTML = "<span style='color: red;'>Erro: ID não encontrado na URL.</span>";
            }
        } else {
            document.getElementById('statusMessage').innerHTML = "<span style='color: red;'>Erro no login. Não foi possível validar a Steam.</span>";
        }
    </script>
</body>
</html>
